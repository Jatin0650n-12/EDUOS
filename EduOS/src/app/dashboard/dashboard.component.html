<div class="dashboard">
  <h2>Upload Document</h2>
  <form (submit)="upload()" class="upload-form" novalidate>
    <input type="file" (change)="onFileSelected($event)" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
    <div *ngIf="fileName" class="file-info">{{ fileName }} ({{ fileSizeText }})</div>
    <div class="error" *ngIf="error">{{ error }}</div>
    <button type="button" (click)="upload()" [disabled]="!selectedFile || uploading">Upload</button>
  </form>
  <div *ngIf="uploading">Uploading... {{ progress }}%</div>
  <div *ngIf="success" class="success">Upload successful</div>
</div>


<table *ngIf="files.length > 0" class="file-table">
    <thead>
      <tr>
        <th>Filename</th>
        <th>Size</th>
        <!-- <th>Uploaded At</th> -->
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let file of files">
        <td>{{ file.originalName }}</td>
        <td>{{ (file.size / 1024).toFixed(2) }} KB</td>
        <!-- <td>{{ file.uploadedAt | date: 'medium' }}</td> -->
        <td>
          <!-- <button (click)="downloadFile(file.gridFsId, file.originalName)">Download</button> -->
          &nbsp;
          <button (click)="extractFile(file.gridFsId, file.originalName)">Get Skills From Resume and Recommendation</button>

          <hr>
           <!-- STEP 2: Show role select + analyze button AFTER extraction -->
        <div *ngIf="skillsExtracted" class="gap-section">
          <select [(ngModel)]="selectedRole" class="role-dropdown">
            <option value="" disabled selected>Select Role</option>
            <option *ngFor="let role of targetRoles" [value]="role">{{ role }}</option>
          </select>

          <button 
            class="analyze-btn" 
            (click)="analyzeGap()" 
            [disabled]="!selectedRole">
            Analyze Gap
          </button>
        </div>

        <hr>

        <button (click)="forecastCareer()">Forecast Career Growth</button>

        </td>
      </tr>
    </tbody>
  </table>
<!-- </div> -->
