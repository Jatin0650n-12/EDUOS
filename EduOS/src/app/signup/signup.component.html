<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
  <h2>Register</h2>

  <label>Username</label>
  <input formControlName="username" type="text" />
  <div class="error" *ngIf="f.username.touched && f.username.invalid">
    <small *ngIf="f.username.errors?.['required']">Username required</small>
    <small *ngIf="f.username.errors?.['minlength']">Min 3 characters</small>
  </div>

  <label>Email</label>
  <input formControlName="email" type="email" />
  <div class="error" *ngIf="f.email.touched && f.email.invalid">
    <small *ngIf="f.email.errors?.['required']">Email required</small>
    <small *ngIf="f.email.errors?.['email']">Invalid email</small>
  </div>

  <label>Name</label>
  <input formControlName="name" type="text" />
  <div class="error" *ngIf="f.name.touched && f.name.invalid">
    <small>Name required</small>
  </div>

  <label>Phone</label>
  <input formControlName="phone" type="tel" />
  <div class="error" *ngIf="f.phone.touched && f.phone.invalid">
    <small *ngIf="f.phone.errors?.['required']">Phone required</small>
    <small *ngIf="f.phone.errors?.['pattern']">Invalid phone</small>
  </div>

  <label>Password</label>
  <div class="password-field">
    <input [type]="showPassword ? 'text' : 'password'" formControlName="password" />
    <button type="button" (click)="togglePassword()">{{ showPassword ? 'Hide' : 'Show' }}</button>
  </div>
  <div class="error" *ngIf="f.password.touched && f.password.invalid">
    <small *ngIf="f.password.errors?.['required']">Password required</small>
    <small *ngIf="f.password.errors?.['minlength']">Min 6 characters</small>
  </div>

  <!-- <label>Role</label>
  <select formControlName="role">
    <option value="user">User</option>
    <option value="admin">Admin</option>
  </select> -->

  <button type="submit" [disabled]="registerForm.invalid || loading">Register</button>

  <div class="server-error" *ngIf="serverError">{{ serverError }}</div>
</form>
